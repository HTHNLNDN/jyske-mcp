<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Finance">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#eff1f5">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <title>Finance</title>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
      })
    }
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base:      '#eff1f5',
            mantle:    '#e6e9ef',
            surface0:  '#ccd0da',
            surface1:  '#bcc0cc',
            text:      '#A9A9A9',
            subtext:   '#6c6f85',
            accent:    '#1e66f5',
            accentalt: '#8839ef',
            warning:   '#df8e1d',
            danger:    '#d20f39',
            success:   '#40a02b',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', 'Arial', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    [x-cloak] { display: none !important; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-10px); }
      40%       { transform: translateX(10px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }
    .shake { animation: shake 0.45s ease-in-out; }

    @keyframes typing-bounce {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30%            { opacity: 1;   transform: translateY(-5px); }
    }
    .typing-dot { animation: typing-bounce 1.2s ease-in-out infinite; }

    @keyframes accent-cycle {
      0%, 100% { background-color: #1e66f5; }
      50%       { background-color: #8839ef; }
    }
    .active-agent-dot { animation: accent-cycle 3s ease-in-out infinite; }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body
  style="background:#eff1f5;color:#4c4f69"
  class="h-full overflow-hidden bg-base text-text font-sans"
  x-data="app()"
  x-init="init()"
>

  <!-- ══════════════════════════════════════════
       PIN SCREEN
  ══════════════════════════════════════════ -->
  <div
    x-show="!pinVerified"
    x-cloak
    x-on:click="$refs.pinInput.focus()"
    class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-base cursor-pointer select-none"
  >
    <p class="mb-10 text-xs tracking-[0.25em] uppercase text-subtext/50">Finance</p>

    <!-- 6 circles — border always accent, background fills on each digit -->
    <div
      class="flex gap-4"
      :class="pinShake ? 'shake' : ''"
    >
      <template x-for="i in 6" :key="i">
        <div
          class="w-4 h-4 rounded-full border-2 border-accent transition-colors duration-100"
          :class="pin.length >= i ? 'bg-accent' : 'bg-transparent'"
        ></div>
      </template>
    </div>

    <!-- Hidden input: receives focus on click, captures all keystrokes -->
    <input
      type="tel"
      inputmode="numeric"
      autocomplete="off"
      x-ref="pinInput"
      x-on:keydown="onPinKey($event)"
      class="sr-only"
      aria-label="Enter 6-digit PIN"
    />

    <!-- Status: lockout countdown / wrong-PIN error / idle hint -->
    <div class="mt-6 h-5 text-sm text-center">
      <span x-show="countdown > 0" class="text-danger">
        Locked — <span x-text="countdown"></span>s remaining
      </span>
      <span x-show="countdown === 0 && pinError" x-text="pinError" class="text-danger"></span>
      <span x-show="countdown === 0 && !pinError" class="text-subtext/60 text-xs">
        Click · then type your PIN
      </span>
    </div>
  </div>


  <!-- ══════════════════════════════════════════
       BURGER MENU — BACKDROP
  ══════════════════════════════════════════ -->
  <div
    x-show="menuOpen"
    x-cloak
    x-on:click="menuOpen = false"
    x-transition:enter="transition-opacity ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-30 bg-text/10"
  ></div>

  <!-- ══════════════════════════════════════════
       BURGER MENU — PANEL
  ══════════════════════════════════════════ -->
  <div
    x-show="menuOpen"
    x-cloak
    x-transition:enter="transition-transform ease-out duration-200"
    x-transition:enter-start="-translate-x-full"
    x-transition:enter-end="translate-x-0"
    x-transition:leave="transition-transform ease-in duration-150"
    x-transition:leave-start="translate-x-0"
    x-transition:leave-end="-translate-x-full"
    class="fixed left-0 top-0 h-full w-72 z-40 bg-mantle flex flex-col overflow-y-auto"
  >
    <div class="px-5 pt-14 pb-4">
      <p class="text-[11px] tracking-[0.2em] uppercase text-subtext">Agents</p>
    </div>

    <nav class="flex-1 pb-2">
      <template x-for="agent in agents" :key="agent.id">
        <button
          x-on:click="activeAgent = agent; view = 'chat'; menuOpen = false"
          class="w-full flex items-center gap-3 px-5 py-3.5 text-left transition-colors hover:bg-surface0"
          :class="activeAgent?.id === agent.id ? 'text-text' : 'text-subtext'"
        >
          <span
            class="flex-shrink-0 w-2 h-2 rounded-full transition-colors"
            :class="activeAgent?.id === agent.id
              ? 'active-agent-dot'
              : 'bg-transparent border border-surface1'"
          ></span>
          <span class="text-sm" x-text="agent.name"></span>
        </button>
      </template>
    </nav>

    <div class="border-t border-surface1">
      <button
        x-on:click="view = 'history'; menuOpen = false; loadHistory()"
        class="w-full flex items-center gap-3 px-5 py-3.5 text-left transition-colors hover:bg-surface0"
        :class="view === 'history' ? 'text-text' : 'text-subtext'"
      >
        <svg class="flex-shrink-0 w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 7v5l3 3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="text-sm">Past Sessions</span>
      </button>
    </div>

    <div class="px-5 py-6 border-t border-surface1">
      <button
        x-on:click="logout()"
        class="text-xs text-subtext hover:text-danger transition-colors"
      >Sign out</button>
    </div>
  </div>


  <!-- ══════════════════════════════════════════
       MAIN APP SHELL
  ══════════════════════════════════════════ -->
  <div
    x-show="pinVerified"
    x-cloak
    class="flex flex-col h-full"
  >

    <!-- Header — 64px content + safe area for notch/Dynamic Island -->
    <header
      class="flex-shrink-0 flex items-center px-4 bg-mantle border-b border-surface1 pt-[env(safe-area-inset-top)]"
      style="min-height: calc(4rem + env(safe-area-inset-top));"
    >
      <button
        x-on:click="menuOpen = true"
        class="w-11 h-11 flex items-center justify-center text-subtext hover:text-text transition-colors"
        aria-label="Open menu"
      >
        <div class="flex flex-col gap-[5px]">
          <span class="block h-px w-[18px] bg-current rounded-full"></span>
          <span class="block h-px w-[18px] bg-current rounded-full"></span>
          <span class="block h-px w-[12px] bg-current rounded-full"></span>
        </div>
      </button>

      <span
        class="flex-1 text-center text-sm font-medium"
        x-text="view === 'history' ? 'Past Sessions' : (activeAgent?.name ?? 'Finance')"
      ></span>

      <button
        class="w-11 h-11 flex items-center justify-center text-subtext hover:text-text transition-colors"
        aria-label="Settings"
      >
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
             viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Conversation area -->
    <main
      x-show="view === 'chat'"
      x-ref="msgContainer"
      class="flex-1 overflow-y-auto overscroll-y-contain"
    >
      <!-- Empty state -->
      <div
        x-show="messages.length === 0 && !isTyping"
        class="h-full flex items-center justify-center px-6"
      >
        <p class="text-subtext/60 text-sm text-center leading-relaxed">
          Ask me anything about your finances
        </p>
      </div>

      <!-- Messages + typing indicator -->
      <div
        x-show="messages.length > 0 || isTyping"
        class="px-4 pt-4 pb-2 space-y-3"
      >
        <template x-for="(msg, idx) in messages" :key="idx">
          <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">

            <!-- Budget card — assistant message that parses as a budget JSON array -->
            <template x-if="msg.role === 'assistant' && parseBudget(msg.content)">
              <div class="w-full max-w-sm bg-surface0 rounded-2xl rounded-tl-sm border-t-2 border-accent overflow-hidden">
                <div class="px-4 pt-3 pb-2.5 border-b border-surface1 flex items-baseline gap-1.5">
                  <span class="text-[11px] font-semibold tracking-[0.12em] uppercase text-subtext">Budget Status</span>
                  <span class="text-[11px] text-subtext/60">· <span x-text="currentMonth()"></span></span>
                </div>
                <div class="px-4 py-3 space-y-4">
                  <template x-for="(row, ri) in parseBudget(msg.content)" :key="ri">
                    <div>
                      <div class="flex justify-between items-baseline mb-1.5">
                        <span class="text-sm text-text" x-text="row.category"></span>
                        <span class="text-xs font-mono tabular-nums"
                          :class="row.status === 'over' ? 'text-danger font-semibold' : row.status === 'warning' ? 'text-warning' : 'text-subtext'"
                          x-text="row.status === 'over' ? 'OVER' : row.percent + '%'">
                        </span>
                      </div>
                      <div class="h-2 bg-surface1 rounded-full overflow-hidden">
                        <div class="h-full rounded-full"
                          :class="row.status === 'over' ? 'bg-danger' : row.status === 'warning' ? 'bg-warning' : 'bg-accent'"
                          :style="'width:' + Math.min(row.percent, 100) + '%'">
                        </div>
                      </div>
                      <div class="mt-1 text-right text-xs text-subtext/70 tabular-nums"
                        x-text="row.spent.toLocaleString('da-DK') + ' / ' + row.limit.toLocaleString('da-DK') + ' DKK'">
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Plain text — all user messages and non-budget assistant messages -->
            <template x-if="msg.role === 'user' || !parseBudget(msg.content)">
              <div
                class="max-w-[80%] text-sm leading-relaxed rounded-2xl px-4 py-2.5 whitespace-pre-wrap"
                :class="msg.role === 'user'
                  ? 'bg-accent text-white font-[450] rounded-tr-sm'
                  : 'bg-surface0 border-l-2 border-accent/40 text-text rounded-tl-sm'"
                x-text="msg.content"
              ></div>
            </template>

          </div>
        </template>

        <!-- Typing indicator — shown while waiting for first token -->
        <div x-show="isTyping" class="flex justify-start">
          <div class="bg-surface0 border-l-2 border-accent/40 rounded-2xl rounded-tl-sm px-4 py-3.5 flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-subtext/40 typing-dot" style="animation-delay:   0ms"></span>
            <span class="w-2 h-2 rounded-full bg-subtext/40 typing-dot" style="animation-delay: 200ms"></span>
            <span class="w-2 h-2 rounded-full bg-subtext/40 typing-dot" style="animation-delay: 400ms"></span>
          </div>
        </div>
      </div>
    </main>

    <!-- History view -->
    <div
      x-show="view === 'history'"
      class="flex-1 overflow-y-auto overscroll-y-contain px-4 pt-4 pb-4 space-y-3"
    >
      <div
        x-show="historyLoading"
        class="h-full flex items-center justify-center"
      >
        <p class="text-subtext/60 text-sm">Loading…</p>
      </div>

      <div
        x-show="!historyLoading && historyEntries.length === 0"
        class="h-full flex items-center justify-center px-6"
      >
        <p class="text-subtext/60 text-sm text-center leading-relaxed">No past sessions yet</p>
      </div>

      <template x-for="(entry, idx) in historyEntries" :key="idx">
        <div class="bg-surface0 rounded-2xl px-4 py-3.5 border-l-2 border-accent/40">
          <p class="text-[11px] tracking-wide uppercase text-subtext mb-1.5" x-text="entry.date"></p>
          <p class="text-sm text-text leading-relaxed" x-text="entry.summary"></p>
        </div>
      </template>
    </div>

    <!-- Input bar — sticky, safe area -->
    <div
      x-show="view === 'chat'"
      class="flex-shrink-0 bg-mantle border-t border-surface1 px-3 pt-3"
      style="padding-bottom: max(12px, env(safe-area-inset-bottom));"
    >
      <div class="flex items-end gap-2">
        <textarea
          rows="1"
          placeholder="Message…"
          x-model="inputText"
          x-on:keydown.enter.exact.prevent="sendMessage()"
          :disabled="isStreaming"
          class="flex-1 resize-none bg-base text-text placeholder-subtext/50 rounded-2xl px-4 py-3 text-base leading-5 outline-none border border-surface1 focus:border-accent/50 transition-colors max-h-32 overflow-y-auto disabled:opacity-50 appearance-none"
          style="field-sizing: content; font-size: 16px; background-color: #eff1f5; color: #4c4f69; -webkit-appearance: none;"
        ></textarea>
        <button
          x-on:click="sendMessage()"
          :disabled="!inputText.trim() || isStreaming"
          :class="inputText.trim() && !isStreaming ? 'opacity-100' : 'opacity-35'"
          class="flex-shrink-0 mb-0.5 w-9 h-9 rounded-full bg-accent flex items-center justify-center transition-opacity"
          aria-label="Send"
        >
          <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>

  </div><!-- end main shell -->


  <!-- ══════════════════════════════════════════
       APP LOGIC
  ══════════════════════════════════════════ -->
  <script>
    function app() {
      return {
        // Auth
        pinVerified: false,
        pin: '',
        pinShake: false,
        pinError: '',
        pinFailures: 0,
        lockedUntil: 0,
        countdown: 0,
        _countdownInterval: null,

        // UI state
        menuOpen: false,
        isTyping: false,
        isStreaming: false,
        view: 'chat',

        // Data
        agents: [],
        activeAgent: null,
        messages: [],
        conversationHistory: [],
        inputText: '',
        historyEntries: [],
        historyLoading: false,

        async init() {
          try {
            const res = await fetch('/agents')
            if (res.ok) {
              this.agents = await res.json()
              this.activeAgent = this.agents[0] ?? null
              this.pinVerified = true
              return
            }
          } catch (_) {}
          this.$nextTick(() => this.$refs.pinInput?.focus())
        },

        onPinKey(e) {
          if (this.lockedUntil > Date.now()) return

          if (e.key >= '0' && e.key <= '9') {
            e.preventDefault()
            if (this.pin.length < 6) {
              this.pin += e.key
              if (this.pin.length === 6) this.submitPin()
            }
          } else if (e.key === 'Backspace') {
            e.preventDefault()
            this.pin = this.pin.slice(0, -1)
            this.pinError = ''
          }
        },

        async submitPin() {
          const pin = this.pin

          const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin }),
          })

          if (res.ok) {
            const r = await fetch('/agents')
            if (r.ok) {
              this.agents = await r.json()
              this.activeAgent = this.agents[0] ?? null
            }
            this.pin = ''
            this.pinFailures = 0
            this.pinVerified = true
            return
          }

          this.pin = ''

          if (res.status === 429) {
            // Server-side lockout (safety net if client counter drifted)
            if (!this.lockedUntil) {
              this.lockedUntil = Date.now() + 60000
              this.countdown = 60
              this.startCountdown()
            }
            return
          }

          // 401 — wrong PIN
          this.pinFailures++
          if (this.pinFailures >= 3) {
            this.lockedUntil = Date.now() + 60000
            this.countdown = 60
            this.pinFailures = 0
            this.pinError = ''
            this.startCountdown()
          } else {
            const left = 3 - this.pinFailures
            this.pinError = `Wrong PIN — ${left} attempt${left === 1 ? '' : 's'} left`
            this.pinShake = true
            setTimeout(() => {
              this.pinShake = false
              this.$refs.pinInput?.focus()
            }, 500)
          }
        },

        startCountdown() {
          if (this._countdownInterval) clearInterval(this._countdownInterval)
          this._countdownInterval = setInterval(() => {
            this.countdown = Math.max(0, Math.ceil((this.lockedUntil - Date.now()) / 1000))
            if (this.countdown === 0) {
              clearInterval(this._countdownInterval)
              this._countdownInterval = null
              this.lockedUntil = 0
              this.$nextTick(() => this.$refs.pinInput?.focus())
            }
          }, 1000)
        },

        async sendMessage() {
          const text = this.inputText.trim()
          if (!text || this.isStreaming) return

          this.inputText = ''
          this.isTyping = true
          this.isStreaming = true

          this.messages.push({ role: 'user', content: text })
          this.$nextTick(() => this.scrollToBottom())

          let res
          try {
            res = await fetch('/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                message: text,
                agent_id: this.activeAgent?.id ?? 'finance',
                history: [...this.conversationHistory],
              }),
            })
          } catch (_) {
            this.isTyping = false
            this.isStreaming = false
            this.messages.push({ role: 'assistant', content: 'Network error — try again.' })
            this.$nextTick(() => this.scrollToBottom())
            return
          }

          if (res.status === 401) {
            this.isTyping = false
            this.isStreaming = false
            this.messages.pop()
            this.pinVerified = false
            this.$nextTick(() => this.$refs.pinInput?.focus())
            return
          }

          this.messages.push({ role: 'assistant', content: '' })
          const msgIdx = this.messages.length - 1
          let accumulated = ''

          const reader = res.body.getReader()
          const decoder = new TextDecoder()
          let buffer = ''

          try {
            outer: while (true) {
              const { done, value } = await reader.read()
              if (done) break

              buffer += decoder.decode(value, { stream: true })
              const parts = buffer.split('\n\n')
              buffer = parts.pop() ?? ''

              for (const part of parts) {
                for (const line of part.split('\n')) {
                  if (!line.startsWith('data: ')) continue
                  const data = line.slice(6)

                  if (data === '[DONE]') {
                    this.conversationHistory.push({ role: 'user', content: text })
                    this.conversationHistory.push({ role: 'assistant', content: accumulated })
                    break outer
                  }

                  if (data.startsWith('[ERROR]')) {
                    this.messages[msgIdx].content = data.slice(7).trim()
                    break outer
                  }

                  if (this.isTyping) {
                    this.isTyping = false
                    this.$nextTick(() => this.scrollToBottom())
                  }

                  let chunk
                  try { chunk = JSON.parse(data) } catch { chunk = data }

                  accumulated += chunk
                  this.messages[msgIdx].content = accumulated
                  this.$nextTick(() => this.scrollToBottom())
                }
              }
            }
          } catch (_) {
            if (!accumulated) this.messages[msgIdx].content = 'Stream interrupted.'
          }

          this.isTyping = false
          this.isStreaming = false
        },

        scrollToBottom() {
          const el = this.$refs.msgContainer
          if (el) el.scrollTop = el.scrollHeight
        },

        async loadHistory() {
          this.historyLoading = true
          try {
            const res = await fetch('/history')
            if (res.ok) this.historyEntries = await res.json()
          } catch (_) {}
          this.historyLoading = false
        },

        async logout() {
          await fetch('/auth/logout', { method: 'POST' })
          this.pinVerified = false
          this.menuOpen = false
          this.view = 'chat'
          this.agents = []
          this.activeAgent = null
          this.messages = []
          this.conversationHistory = []
          this.inputText = ''
          this.historyEntries = []
          this.historyLoading = false
          this.pin = ''
          this.pinFailures = 0
          this.lockedUntil = 0
          this.countdown = 0
          if (this._countdownInterval) {
            clearInterval(this._countdownInterval)
            this._countdownInterval = null
          }
          this.$nextTick(() => this.$refs.pinInput?.focus())
        },

        parseBudget(content) {
          try {
            const data = JSON.parse(content)
            if (Array.isArray(data) && data.length > 0 && 'category' in data[0] && 'spent' in data[0]) {
              return data
            }
          } catch (_) {}
          return null
        },

        currentMonth() {
          return new Date().toLocaleString('en-US', { month: 'long' })
        },
      }
    }
  </script>

</body>
</html>
